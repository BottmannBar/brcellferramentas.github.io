<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRCELL - Simulador de Avaliação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; }
        .glass-card { background: rgba(24, 24, 27, 0.8); border: 1px solid #27272a; backdrop-filter: blur(10px); }
        input, select { background-color: #18181b !important; border: 1px solid #27272a !important; color: white !important; }
        input:focus, select:focus { border-color: #22c55e !important; box-shadow: 0 0 0 1px #22c55e !important; }
        .checkbox-custom:checked { background-color: #22c55e; border-color: #22c55e; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-2xl p-6 shadow-2xl">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-green-500/20 p-2 rounded-lg">
                <i data-lucide="smartphone" class="text-green-500"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Simulador BRCELL</h1>
                <p class="text-xs text-zinc-400">Avaliação rápida e profissional</p>
            </div>
        </div>

        <div id="loader" class="flex flex-col items-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500 mb-2"></div>
            <p class="text-sm text-zinc-500">Sincronizando com a base...</p>
        </div>

        <div id="content" class="hidden space-y-5">
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium mb-1.5 block">Marca</label>
                    <select id="marca" class="w-full p-2.5 rounded-lg text-sm outline-none transition-all">
                        <option value="">Todas as marcas</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-medium mb-1.5 block">Aparelho</label>
                    <input list="aparelhos" id="aparelho" placeholder="Ex: iPhone 13 Pro..." 
                           class="w-full p-2.5 rounded-lg text-sm outline-none transition-all">
                    <datalist id="aparelhos"></datalist>
                </div>

                <div>
                    <label class="text-sm font-medium mb-1.5 block">Tipo de Negócio</label>
                    <select id="tipo" class="w-full p-2.5 rounded-lg text-sm outline-none">
                        <option value="compra">Apenas Compra</option>
                        <option value="parte">Parte de Pagamento</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-sm font-medium mb-3 block">Estado do Aparelho (Marque os defeitos)</label>
                <div class="grid grid-cols-2 gap-2" id="defeitosGrid"></div>
            </div>

            <div class="bg-green-500/10 border border-green-500/20 rounded-xl p-5 text-center">
                <span class="text-zinc-400 text-xs uppercase tracking-widest font-semibold">Valor Estimado</span>
                <div id="resultado" class="text-3xl font-black text-green-500 mt-1">R$ 0,00</div>
            </div>

            <a href="#" id="btnZap" target="_blank" 
               class="flex items-center justify-center gap-2 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-green-900/20">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                Enviar Orçamento
            </a>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbyObLX05NTruDPeGEqsDxCIt41m-s8z2iozVTBWrwi-EOaYg5B6IZ0q4EFoP76fHI4-/exec";
        const WHATSAPP_LOJA = "41997589416"; // Substitua pelo seu número real

        let dadosPrecos = {};
        const defeitos = ["Tela", "Bateria", "Camera", "Placa", "Antena", "AltoFalante", "Microfone", "Conector", "Vibracall", "SO", "TampaTraseira"];

        async function init() {
            try {
                const response = await fetch(URL_API);
                dadosPrecos = await response.json();
                
                // Preencher Marcas
                const mSelect = document.getElementById('marca');
                dadosPrecos.marcas.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    mSelect.appendChild(opt);
                });

                // Criar Grid de Defeitos
                const grid = document.getElementById('defeitosGrid');
                defeitos.forEach(d => {
                    const div = document.createElement('label');
                    div.className = "flex items-center gap-2 p-2 rounded-lg bg-zinc-900/50 border border-zinc-800 cursor-pointer hover:bg-zinc-800 transition-colors";
                    div.innerHTML = `<input type="checkbox" value="${d}" class="defeito-cb rounded border-zinc-700 bg-zinc-800 text-green-500 focus:ring-green-500"> <span class="text-xs text-zinc-300">${d}</span>`;
                    grid.appendChild(div);
                });

                // Ativar Eventos
                document.getElementById('marca').onchange = filtrar;
                document.getElementById('aparelho').oninput = calcular;
                document.getElementById('tipo').onchange = calcular;
                document.addEventListener('change', e => { if(e.target.classList.contains('defeito-cb')) calcular(); });

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "<p class='text-red-500'>Erro na conexão</p>";
            }
        }

        function filtrar() {
            const marca = document.getElementById('marca').value;
            const dl = document.getElementById('aparelhos');
            dl.innerHTML = '';
            const filtrados = marca ? dadosPrecos.aparelhos.filter(a => a.marca === marca) : dadosPrecos.aparelhos;
            filtrados.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.aparelho;
                dl.appendChild(opt);
            });
            document.getElementById('aparelho').value = '';
            calcular();
        }

        function calcular() {
            const mod = document.getElementById('aparelho').value;
            const tipo = document.getElementById('tipo').value;
            const resDiv = document.getElementById('resultado');
            
            if (!mod || !dadosPrecos.valores[mod]) {
                resDiv.textContent = "R$ 0,00";
                return;
            }

            let total = parseFloat(dadosPrecos.valores[mod][tipo].valorBase) || 0;
            let selecionados = [];

            document.querySelectorAll('.defeito-cb:checked').forEach(cb => {
                total -= (parseFloat(dadosPrecos.valores[mod][tipo][cb.value]) || 0);
                selecionados.push(cb.value);
            });

            if (total < 0) total = 0;
            const formatado = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            resDiv.textContent = formatado;

            const msg = `Olá! Simulação BRCELL:%0A*Aparelho:* ${mod}%0A*Defeitos:* ${selecionados.join(', ') || 'Nenhum'}%0A*Total:* ${formatado}`;
            document.getElementById('btnZap').href = `https://wa.me/${WHATSAPP_LOJA}?text=${msg}`;
        }

        init();
    </script>
</body>
</html>
