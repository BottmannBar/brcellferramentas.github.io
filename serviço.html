<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRCELL | Simulador de Orçamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #09090b;
            --accent-green: #22c55e;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg-deep); 
            color: #fafafa; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #14532d33, transparent 50%);
        }

        .glass-card { 
            background: rgba(24, 24, 27, 0.7); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Estilo Cupom Térmico Moderno */
        .receipt {
            background: #111113;
            border: 1px dashed #27272a;
            position: relative;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .receipt::before, .receipt::after {
            content: "";
            position: absolute;
            left: -1px;
            right: -1px;
            height: 6px;
            background-size: 12px 6px;
            background-repeat: repeat-x;
        }
        .receipt::before {
            top: -6px;
            background-image: linear-gradient(135deg, var(--bg-deep) 25%, transparent 25%), linear-gradient(225deg, var(--bg-deep) 25%, transparent 25%);
        }
        .receipt::after {
            bottom: -6px;
            background-image: linear-gradient(45deg, var(--bg-deep) 25%, transparent 25%), linear-gradient(-45deg, var(--bg-deep) 25%, transparent 25%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        input[type="checkbox"] {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #3f3f46;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        input[type="checkbox"]:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }
        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-card rounded-3xl p-8 transition-all">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-green-500/10 p-3 rounded-2xl border border-green-500/20">
                    <i data-lucide="cpu" class="text-green-500 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter leading-none italic">BRCELL</h1>
                    <p class="text-[9px] text-zinc-500 uppercase tracking-[0.3em] font-bold mt-1.5">Premium Lab Services</p>
                </div>
            </div>
            <div id="status-pulse" class="flex items-center gap-2 px-2 py-1 bg-zinc-900 rounded-full border border-zinc-800">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-zinc-400 uppercase">Live</span>
            </div>
        </div>

        <div id="loader" class="flex flex-col items-center py-16">
            <div class="w-10 h-10 border-2 border-zinc-800 border-t-green-500 rounded-full animate-spin"></div>
            <p class="text-[11px] text-zinc-500 mt-4 font-medium tracking-widest uppercase">Acessando Database...</p>
        </div>

        <div id="content" class="hidden space-y-8 fade-in">
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Fabricante</label>
                    <select id="marca" class="w-full p-4 rounded-2xl text-sm outline-none transition-all focus:border-green-500/50 hover:bg-zinc-800/50 cursor-pointer"></select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Modelo do Dispositivo</label>
                    <select id="modelo" class="w-full p-4 rounded-2xl text-sm outline-none transition-all focus:border-green-500/50 hover:bg-zinc-800/50 cursor-pointer"></select>
                </div>
            </div>

            <div id="areaServicos" class="hidden space-y-4">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] whitespace-nowrap">Manutenção</span>
                    <div class="h-px w-full bg-zinc-800/50"></div>
                </div>
                <div id="gridServicos" class="grid gap-2.5 max-h-[220px] overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>

            <div id="resumoCupom" class="hidden fade-in">
                <div class="receipt p-6 rounded-lg shadow-inner">
                    <div class="flex justify-between items-center mb-6 border-b border-zinc-800 border-dashed pb-4">
                        <div class="text-[10px] text-zinc-500 leading-relaxed">
                            <p class="font-bold text-zinc-300">ORÇAMENTO #<span id="protocolo"></span></p>
                            <p id="dataAtual"></p>
                        </div>
                        <i data-lucide="qr-code" class="w-8 h-8 text-zinc-700"></i>
                    </div>
                    
                    <div id="listaItensCupom" class="space-y-2.5 text-[11px] mb-6">
                        </div>

                    <div class="border-t border-zinc-800 border-dashed pt-5 mt-2">
                        <div class="flex justify-between items-end">
                            <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-tighter">Valor Total Estimado</span>
                            <div id="resultado" class="text-3xl font-black text-white tracking-tighter">R$ 0,00</div>
                        </div>
                    </div>
                </div>
                <p id="aviso" class="text-[10px] text-amber-500/70 mt-4 text-center italic font-medium hidden">
                    *Preços podem variar conforme o estado interno do hardware.
                </p>
            </div>

            <div class="pt-2">
                <a href="#" id="btnZap" target="_blank" class="flex items-center justify-center gap-3 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-green-900/20 active:scale-[0.97]">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    Enviar para Técnico
                </a>
            </div>

            <div class="text-center">
                <a href="index.html" class="text-[10px] text-zinc-600 hover:text-zinc-200 uppercase font-black tracking-[0.2em] transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Voltar ao Menu
                </a>
            </div>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzgqa8KNM38ngwq6_cVpnh-pzJWl5E2bGATkqUiPnbgsawgsxBDPWQ5lqmADaX4S07QVA/exec";
        const WHATSAPP_LOJA = "554197589418";

        // Preencher dados automáticos
        document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('protocolo').innerText = Math.floor(1000 + Math.random() * 9000);

        let tabelaDados = [];
        let cabecalhos = [];

        async function carregarDados() {
            try {
                const res = await fetch(URL_API);
                const data = await res.json();
                cabecalhos = data.headers;
                tabelaDados = data.rows;

                const marcas = [...new Set(tabelaDados.map(l => l[0]))].filter(m => m);
                const selMarca = document.getElementById('marca');
                selMarca.innerHTML = "<option value=''>Selecione o Fabricante</option>" + 
                                     marcas.map(m => `<option value="${m}">${m}</option>`).join("");

                selMarca.onchange = carregarModelos;
                document.getElementById('modelo').onchange = montarServicos;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) {
                document.getElementById('loader').innerHTML = "<p class='text-red-500 text-xs font-bold'>ERRO NA SINCRONIZAÇÃO</p>";
            }
        }

        function carregarModelos() {
            const m = document.getElementById('marca').value;
            const modelos = tabelaDados.filter(l => l[0] === m).map(l => l[1]);
            const selMod = document.getElementById('modelo');
            selMod.innerHTML = "<option value=''>Modelo do Aparelho</option>" + 
                               modelos.map(mod => `<option value="${mod}">${mod}</option>`).join("");
            document.getElementById('areaServicos').classList.add('hidden');
            document.getElementById('resumoCupom').classList.add('hidden');
        }

        function montarServicos() {
            const m = document.getElementById('marca').value;
            const mod = document.getElementById('modelo').value;
            const grid = document.getElementById('gridServicos');
            grid.innerHTML = "";

            if(!mod) return;

            const linha = tabelaDados.find(l => l[0] === m && l[1] === mod);
            if (!linha) return;

            document.getElementById('areaServicos').classList.remove('hidden');
            const nomesServicos = cabecalhos.slice(3);
            const valoresServicos = linha.slice(3);

            nomesServicos.forEach((nome, i) => {
                const valorRaw = valoresServicos[i];
                if(!valorRaw) return;

                const valorTexto = isNaN(parseFloat(valorRaw)) ? valorRaw : "R$ " + parseFloat(valorRaw).toFixed(2).replace(".", ",");
                
                const card = document.createElement('label');
                card.className = "flex items-center justify-between p-4 rounded-2xl cursor-pointer bg-zinc-900/50 border border-zinc-800 hover:border-zinc-600 transition-all group";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="${valorRaw}" data-nome="${nome}" class="servico-cb">
                        <span class="text-sm font-semibold text-zinc-400 group-hover:text-zinc-100 transition-colors">${nome}</span>
                    </div>
                    <span class="text-[11px] font-black text-green-500/80">${valorTexto}</span>
                `;
                grid.appendChild(card);
            });

            document.querySelectorAll('.servico-cb').forEach(cb => cb.onchange = atualizarSoma);
            atualizarSoma();
        }

        function atualizarSoma() {
            const selecionados = [...document.querySelectorAll('.servico-cb:checked')];
            const resDiv = document.getElementById('resultado');
            const aviso = document.getElementById('aviso');
            const cupomDiv = document.getElementById('resumoCupom');
            const listaItens = document.getElementById('listaItensCupom');
            
            if (selecionados.length === 0) {
                cupomDiv.classList.add('hidden');
                resDiv.innerText = "R$ 0,00";
                return;
            }

            cupomDiv.classList.remove('hidden');
            listaItens.innerHTML = "";
            let soma = 0;
            let sobConsulta = false;

            selecionados.forEach(cb => {
                const v = cb.value;
                const nome = cb.getAttribute('data-nome');
                const valorFormatado = isNaN(parseFloat(v)) ? "CONSULTAR" : "R$ " + parseFloat(v).toFixed(2).replace(".", ",");
                
                const itemRow = document.createElement('div');
                itemRow.className = "flex justify-between items-center text-zinc-400";
                itemRow.innerHTML = `<span class="uppercase tracking-tighter">${nome}</span><span class="text-zinc-200 font-bold">${valorFormatado}</span>`;
                listaItens.appendChild(itemRow);

                if (!isNaN(parseFloat(v))) soma += parseFloat(v);
                else sobConsulta = true;
            });

            if (sobConsulta) {
                resDiv.innerText = "SOB CONSULTA";
                resDiv.className = "text-xl font-black text-amber-500 tracking-tighter";
                aviso.classList.remove('hidden');
            } else {
                resDiv.innerText = soma.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                resDiv.className = "text-3xl font-black text-white tracking-tighter";
                aviso.classList.add('hidden');
            }

            const mod = document.getElementById('modelo').value;
            const listaNomes = selecionados.map(cb => cb.getAttribute('data-nome')).join(', ');
            const msg = `*BRCELL - NOVO ORÇAMENTO*%0A%0A*Modelo:* ${mod}%0A*Protocolo:* ${document.getElementById('protocolo').innerText}%0A*Serviços:* ${listaNomes}%0A%0A*TOTAL ESTIMADO:* ${resDiv.innerText}`;
            document.getElementById('btnZap').href = `https://wa.me/${WHATSAPP_LOJA}?text=${msg}`;
        }

        carregarDados();
    </script>
</body>
</html>
