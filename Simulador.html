<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRCELL | Simulador de Avaliação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #09090b;
            --accent-green: #22c55e;
            --accent-amber: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg-deep); 
            color: #fafafa; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #14532d33, transparent 50%);
        }

        .glass-card { 
            background: rgba(24, 24, 27, 0.85); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(12px); 
        }

        /* Input/Select Styling */
        select, input {
            background-color: #18181b !important;
            color: #ffffff !important;
            border: 1px solid #3f3f46 !important;
        }

        /* Receipt Style */
        .receipt {
            background: #111113;
            border: 1px dashed #27272a;
            position: relative;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }
        
        .receipt::before, .receipt::after {
            content: "";
            position: absolute;
            left: -1px; right: -1px; height: 6px;
            background-size: 12px 6px;
            background-repeat: repeat-x;
        }
        .receipt::before {
            top: -6px;
            background-image: linear-gradient(135deg, var(--bg-deep) 25%, transparent 25%), linear-gradient(225deg, var(--bg-deep) 25%, transparent 25%);
        }
        .receipt::after {
            bottom: -6px;
            background-image: linear-gradient(45deg, var(--bg-deep) 25%, transparent 25%), linear-gradient(-45deg, var(--bg-deep) 25%, transparent 25%);
        }

        /* Checkbox Custom */
        .defeito-cb {
            appearance: none;
            width: 1.1rem; height: 1.1rem;
            border: 2px solid #3f3f46;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .defeito-cb:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }
        .defeito-cb:checked::after {
            content: "✓";
            position: absolute; color: white; font-size: 10px; font-weight: bold;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-card rounded-3xl p-8 shadow-2xl">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-green-500/10 p-3 rounded-2xl border border-green-500/20">
                    <i data-lucide="smartphone" class="text-green-500 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter leading-none italic text-white uppercase">BRCELL</h1>
                    <p class="text-[9px] text-zinc-500 uppercase tracking-[0.3em] font-bold mt-1.5 whitespace-nowrap">Melhor avaliação de Curitiba</p>
                </div>
            </div>
            <div class="flex items-center gap-2 px-2.5 py-1.5 bg-zinc-900 rounded-full border border-zinc-800">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest leading-none">Online</span>
            </div>
        </div>

        <div id="loader" class="flex flex-col items-center py-16">
            <div class="w-10 h-10 border-2 border-zinc-800 border-t-green-500 rounded-full animate-spin"></div>
            <p class="text-[11px] text-zinc-500 mt-4 font-medium tracking-widest uppercase">Acessando Database...</p>
        </div>

        <div id="content" class="hidden space-y-8 fade-in">
            <div class="space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Fabricante</label>
                        <select id="marca" class="w-full p-4 rounded-2xl text-sm outline-none transition-all focus:border-green-500/50"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Modelo do Dispositivo</label>
                        <input list="aparelhos" id="aparelho" placeholder="Digite o modelo..." class="w-full p-4 rounded-2xl text-sm outline-none transition-all focus:border-green-500/50">
                        <datalist id="aparelhos"></datalist>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Modalidade</label>
                        <select id="tipo" class="w-full p-4 rounded-2xl text-sm outline-none">
                            <option value="compra">Apenas Compra</option>
                            <option value="parte">Parte de Pagamento</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex items-center gap-4 px-1">
                    <span class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] whitespace-nowrap">Checklist de Estado</span>
                    <div class="h-px w-full bg-zinc-800/50"></div>
                </div>
                <div class="grid grid-cols-2 gap-2.5" id="defeitosGrid"></div>
            </div>

            <div id="areaResultado" class="fade-in">
                <div id="receiptCard" class="receipt p-6 rounded-lg shadow-inner">
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-tighter block mb-1">Avaliação Estimada</span>
                            <div id="resultado" class="text-3xl font-black text-white tracking-tighter leading-none transition-all">R$ 0,00</div>
                        </div>
                        <div id="iconStatus">
                            <i data-lucide="shield-check" class="w-8 h-8 text-zinc-800"></i>
                        </div>
                    </div>
                </div>
                <p id="labelValidade" class="text-[9px] text-zinc-500 mt-4 text-center italic px-4 uppercase tracking-tighter">
                    Validade da cotação: 3 dias úteis. Sujeito a análise presencial.
                </p>
            </div>

            <div class="pt-2">
                <a href="#" id="btnZap" target="_blank" class="flex items-center justify-center gap-3 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-green-900/20 active:scale-[0.97]">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    Enviar Proposta
                </a>
            </div>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbyObLX05NTruDPeGEqsDxCIt41m-s8z2iozVTBWrwi-EOaYg5B6IZ0q4EFoP76fHI4-/exec";
        const WHATSAPP_LOJA = "554197589418";

        let dadosPrecos = {};
        const defeitos = ["Tela", "Bateria", "Camera", "Placa", "Antena", "AltoFalante", "Microfone", "Conector", "Vibracall", "SO", "TampaTraseira"];

        async function init() {
            try {
                const response = await fetch(URL_API);
                dadosPrecos = await response.json();
                
                const mSelect = document.getElementById('marca');
                mSelect.innerHTML = '<option value="">Selecione a Marca</option>';
                dadosPrecos.marcas.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    mSelect.appendChild(opt);
                });

                const grid = document.getElementById('defeitosGrid');
                defeitos.forEach(d => {
                    const div = document.createElement('label');
                    div.className = "flex items-center gap-3 p-3 rounded-xl bg-zinc-900/50 border border-zinc-800 cursor-pointer hover:border-zinc-600 transition-all group";
                    div.innerHTML = `
                        <input type="checkbox" value="${d}" class="defeito-cb"> 
                        <span class="text-[11px] font-semibold text-zinc-400 group-hover:text-zinc-200">${d}</span>
                    `;
                    grid.appendChild(div);
                });

                document.getElementById('marca').onchange = filtrar;
                document.getElementById('aparelho').oninput = calcular;
                document.getElementById('tipo').onchange = calcular;
                document.addEventListener('change', e => { if(e.target.classList.contains('defeito-cb')) calcular(); });

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) {
                document.getElementById('loader').innerHTML = "<p class='text-red-500 font-bold uppercase text-[10px]'>Erro de Conexão</p>";
            }
        }

        function filtrar() {
            const marca = document.getElementById('marca').value;
            const dl = document.getElementById('aparelhos');
            dl.innerHTML = '';
            const filtrados = marca ? dadosPrecos.aparelhos.filter(a => a.marca === marca) : dadosPrecos.aparelhos;
            filtrados.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.aparelho;
                dl.appendChild(opt);
            });
            document.getElementById('aparelho').value = '';
            calcular();
        }

        function calcular() {
            const mod = document.getElementById('aparelho').value;
            const tipo = document.getElementById('tipo').value;
            const resDiv = document.getElementById('resultado');
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            const labelValidade = document.getElementById('labelValidade');
            const iconStatus = document.getElementById('iconStatus');
            
            if (!mod || !dadosPrecos.valores[mod]) {
                resDiv.textContent = "R$ 0,00";
                resDiv.className = "text-3xl font-black text-white tracking-tighter leading-none";
                labelValidade.style.opacity = "1";
                return;
            }

            let total = parseFloat(dadosPrecos.valores[mod][tipo].valorBase) || 0;
            let selecionados = [];

            document.querySelectorAll('.defeito-cb:checked').forEach(cb => {
                total -= (parseFloat(dadosPrecos.valores[mod][tipo][cb.value]) || 0);
                selecionados.push(cb.value);
            });

            let msg = "";

            if (total <= 0) {
                // Caso não tenha valor comercial
                resDiv.textContent = "Infelizmente não pegamos!";
                resDiv.className = "text-lg font-black text-amber-500 tracking-tighter leading-tight italic";
                labelValidade.style.opacity = "0";
                iconStatus.innerHTML = '<i data-lucide="alert-circle" class="w-8 h-8 text-amber-900/50"></i>';
                
                msg = `*BRCELL - AVALIAÇÃO*%0A%0A*Aparelho:* ${mod}%0A*Data:* ${dataHoje}%0A*Estado:* ${selecionados.join(', ') || 'Sem Defeitos'}%0A%0A*RESULTADO:* Não temos interesse comercial no estado atual devido ao custo de reparo.`;
            } else {
                // Caso tenha valor positivo
                const formatado = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                resDiv.textContent = formatado;
                resDiv.className = "text-3xl font-black text-white tracking-tighter leading-none";
                labelValidade.style.opacity = "1";
                iconStatus.innerHTML = '<i data-lucide="shield-check" class="w-8 h-8 text-zinc-800"></i>';

                msg = `*BRCELL - AVALIAÇÃO*%0A%0A*Aparelho:* ${mod}%0A*Data:* ${dataHoje}%0A*Modalidade:* ${tipo === 'compra' ? 'Venda Direta' : 'Troca/Pagamento'}%0A*Estado:* ${selecionados.join(', ') || 'Sem Defeitos'}%0A%0A*VALOR ESTIMADO:* ${formatado}%0A----------------------------%0A⚠️ _Validade: 3 dias úteis_`;
            }

            lucide.createIcons();
            document.getElementById('btnZap').href = `https://wa.me/${WHATSAPP_LOJA}?text=${msg}`;
        }

        init();
    </script>
</body>
</html>
