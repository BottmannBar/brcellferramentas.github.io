<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRCELL - Sistema Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(24, 24, 27, 0.8); border: 1px solid #27272a; backdrop-filter: blur(10px); }
        input, textarea, select { background-color: #18181b !important; border: 1px solid #27272a !important; color: white !important; font-size: 14px !important; }
        input:focus { border-color: #22c55e !important; outline: none; box-shadow: 0 0 0 1px #22c55e; }
        .check-btn { border: 1px solid #27272a; transition: all 0.2s; cursor: pointer; }
        .check-btn:has(input:checked) { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        canvas { background: #fff; border-radius: 8px; cursor: crosshair; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 9, 11, 0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #27272a;
            border-top: 4px solid #22c55e; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 bg-zinc-950">

    <div id="loadingOverlay">
        <div class="spinner mb-4"></div>
        <p id="loadingStatus" class="text-green-500 font-black uppercase tracking-widest text-[10px]">Sincronizando BRCELL...</p>
    </div>

    <div class="max-w-2xl mx-auto glass-card rounded-2xl p-6 mb-10 shadow-2xl">
        
        <div class="mb-8 p-4 bg-green-500/5 rounded-2xl border border-green-500/20">
            <label class="text-[10px] font-black text-green-500 uppercase tracking-widest mb-2 block">Localizar Cliente (Nome, CPF ou Celular)</label>
            <div class="relative">
                <input type="text" id="busca_cliente" placeholder="Digite para pesquisar..." 
                       class="w-full p-3 pl-10 rounded-xl outline-none border-none focus:ring-1 focus:ring-green-500">
                <button type="button" onclick="verificarCadastro(document.getElementById('busca_cliente').value)" 
                        class="absolute right-2 top-2 p-1.5 bg-green-600 rounded-lg hover:bg-green-500 transition-colors">
                    <i data-lucide="search" class="w-4 h-4 text-white"></i>
                </button>
                <i data-lucide="user-search" class="absolute left-3 top-3.5 w-4 h-4 text-zinc-500"></i>
            </div>
        </div>

        <form id="formGeral" class="space-y-6">
            
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="bg-green-500/20 p-3 rounded-xl"><i data-lucide="shield-check" class="text-green-500"></i></div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight text-white">BRCELL</h1>
                        <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Cadastro & Serviço</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="text-right">
                        <label class="text-[8px] font-bold text-zinc-500 uppercase block">Entrada</label>
                        <input type="date" id="data_entrada" class="bg-zinc-900 border-none text-zinc-300 text-[10px] p-1 rounded outline-none w-28">
                    </div>
                    <div class="text-right">
                        <label class="text-[8px] font-bold text-amber-500 uppercase block">Previsão</label>
                        <input type="date" id="data_previsao" class="bg-zinc-900 border-none text-amber-500 text-[10px] p-1 rounded outline-none w-28">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full p-3 rounded-xl outline-none" required>
                </div>
                <input type="text" id="doc_cliente" onblur="verificarCadastro(this.value)" placeholder="CPF / CNPJ" class="w-full p-3 rounded-xl outline-none" required>
                <input type="email" id="email" placeholder="E-mail" class="w-full p-3 rounded-xl outline-none">
                <input type="text" id="celular1" oninput="maskTel(this)" placeholder="Celular 1 (WhatsApp)" class="w-full p-3 rounded-xl outline-none font-bold text-green-400" required>
                <input type="text" id="celular2" oninput="maskTel(this)" placeholder="Celular 2 / Recado" class="w-full p-3 rounded-xl outline-none">
            </div>

            <div class="space-y-4 p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="cep" onblur="buscarCEP(this.value)" placeholder="CEP" class="p-3 rounded-xl outline-none">
                    <input type="text" id="endereco" placeholder="Rua" class="md:col-span-2 p-3 rounded-xl outline-none">
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <input type="text" id="numero" placeholder="Nº" class="p-3 rounded-xl outline-none">
                    <input type="text" id="complemento" placeholder="Comp." class="p-3 rounded-xl outline-none">
                    <input type="text" id="bairro" placeholder="Bairro" class="p-3 rounded-xl outline-none">
                    <input type="text" id="cidade_uf" placeholder="Cidade-UF" class="p-3 rounded-xl outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="aparelho" placeholder="Modelo Aparelho" class="w-full p-3 rounded-xl outline-none" required>
                <input type="text" id="senha" placeholder="Senha" class="w-full p-3 rounded-xl outline-none border-amber-900/20">
            </div>
            <textarea id="problema" placeholder="Defeito Relatado" class="w-full p-4 rounded-xl outline-none h-24 border-red-900/20"></textarea>

            <div class="space-y-4">
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    <label class="check-btn flex items-center justify-center p-3 rounded-xl text-[10px] font-black gap-2 col-span-full border-red-900/50 text-red-400">
                        <input type="checkbox" id="desligado" class="hidden" onchange="toggleDesligado(this)"> 
                        <i data-lucide="power-off"></i> DESLIGADO TOTALMENTE
                    </label>
                    <label class="check-btn flex items-center gap-2 p-3 rounded-xl text-[10px] item-check uppercase"><input type="checkbox" name="checklist" value="Tela OK" class="hidden"> Tela OK</label>
                    <label class="check-btn flex items-center gap-2 p-3 rounded-xl text-[10px] item-check uppercase"><input type="checkbox" name="checklist" value="Touch OK" class="hidden"> Touch OK</label>
                    <label class="check-btn flex items-center gap-2 p-3 rounded-xl text-[10px] item-check uppercase"><input type="checkbox" name="checklist" value="Carga OK" class="hidden"> Carga OK</label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-zinc-900/40 rounded-2xl border border-zinc-800">
                <input type="file" id="fotoFrente" accept="image/*" capture="camera" class="w-full text-xs text-zinc-500">
                <input type="file" id="fotoVerso" accept="image/*" capture="camera" class="w-full text-xs text-zinc-500">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-500 uppercase flex justify-between">Assinatura <button type="button" onclick="pad.clear()" class="text-red-500 underline uppercase">Limpar</button></label>
                <canvas id="signature-pad" class="w-full h-32 border border-zinc-800"></canvas>
            </div>

            <div class="flex flex-col items-center">
                <input type="text" id="valor_servico" oninput="maskMoney(this)" class="w-full bg-transparent text-3xl font-black text-center text-white outline-none mb-4" placeholder="R$ 0,00">
                <button type="submit" id="btnEnviar" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-2 uppercase italic">
                    <i data-lucide="save"></i> Salvar Tudo
                </button>
            </div>
        </form>
    </div>

    <script>
        const canvas = document.getElementById("signature-pad");
        const pad = new SignaturePad(canvas);
        const loading = document.getElementById('loadingOverlay');

        // URLs DE IMPLANTAÇÃO (Atualizadas)
        const URL_CADASTRO = "https://script.google.com/macros/s/AKfycbwMl9MwzfwJeCV2zvsuOhiYJ4X0ZA1UHVRuWny23pkG-3WCfrYPP5iYcCV0-dTkwI1fsw/exec";
        const URL_SERVICO  = "https://script.google.com/macros/s/AKfycbw7aF7vPnHfXfmNK37a1Q_Cjk8pUpzMJrKOBVL4j4tna8vqn3ocmFU4v7jP7jIaDwvL/exec";

        document.getElementById('data_entrada').valueAsDate = new Date();

        async function verificarCadastro(termo) {
            if (termo.length < 3) return;
            loading.style.display = 'flex';
            try {
                const res = await fetch(URL_CADASTRO, { method: 'POST', body: JSON.stringify({ acao: "buscar", termo: termo }) });
                const d = await res.json();
                if (d.status === "encontrado") {
                    document.getElementById('nome').value = d.c.nome || "";
                    document.getElementById('doc_cliente').value = d.c.doc || "";
                    document.getElementById('email').value = d.c.email || "";
                    document.getElementById('celular1').value = d.c.cel1 || "";
                    document.getElementById('celular2').value = d.c.cel2 || "";
                    document.getElementById('endereco').value = d.c.end || "";
                    document.getElementById('numero').value = d.c.num || "";
                    document.getElementById('complemento').value = d.c.comp || "";
                    document.getElementById('bairro').value = d.c.bairro || "";
                    document.getElementById('cep').value = d.c.cep || "";
                    document.getElementById('cidade_uf').value = (d.c.cid && d.c.uf) ? `${d.c.cid} - ${d.c.uf}` : d.c.cid || "";
                }
            } catch (e) { console.error(e); }
            loading.style.display = 'none';
        }

        function toggleDesligado(el) {
            document.querySelectorAll('.item-check input').forEach(c => {
                c.checked = false;
                c.closest('label').style.opacity = el.checked ? "0.2" : "1";
                c.disabled = el.checked;
            });
        }

        document.getElementById('formGeral').onsubmit = async (e) => {
            e.preventDefault();
            if (pad.isEmpty()) { alert("Assinatura obrigatória!"); return; }
            loading.style.display = 'flex';

            const toB64 = f => new Promise(res => { 
                if(!f) return res(""); 
                const r = new FileReader(); 
                r.onload = () => res(r.result); 
                r.readAsDataURL(f); 
            });
            
            const dadosBase = {
                nome: document.getElementById('nome').value,
                doc: document.getElementById('doc_cliente').value,
                email: document.getElementById('email').value,
                cel1: document.getElementById('celular1').value,
                cel2: document.getElementById('celular2').value,
                end: document.getElementById('endereco').value,
                num: document.getElementById('numero').value,
                comp: document.getElementById('complemento').value,
                bairro: document.getElementById('bairro').value,
                cep: document.getElementById('cep').value,
                cid_uf: document.getElementById('cidade_uf').value
            };

            const fotoFrente = await toB64(document.getElementById('fotoFrente').files[0]);
            const fotoVerso = await toB64(document.getElementById('fotoVerso').files[0]);

            const dadosServico = {
                aparelho: document.getElementById('aparelho').value,
                senha: document.getElementById('senha').value,
                problema: document.getElementById('problema').value,
                valor: document.getElementById('valor_servico').value,
                checklist: document.getElementById('desligado').checked ? "DESLIGADO" : [...document.querySelectorAll('input[name="checklist"]:checked')].map(s => s.value).join(", "),
                assinatura: pad.toDataURL(),
                fotoFrente: fotoFrente,
                fotoVerso: fotoVerso,
                data_entrada: document.getElementById('data_entrada').value,
                data_previsao: document.getElementById('data_previsao').value
            };

            try {
                // 1. SALVAR CADASTRO
                document.getElementById('loadingStatus').innerText = "Atualizando Cadastro...";
                const resCad = await fetch(URL_CADASTRO, { method: 'POST', body: JSON.stringify({acao: "salvar", ...dadosBase}) });
                const dataCad = await resCad.json();
                
                if (dataCad.status === "sucesso") {
                    const idOficial = dataCad.id;

                    // 2. SALVAR SERVIÇO
                    document.getElementById('loadingStatus').innerText = "Sincronizando OS #" + idOficial + "...";
                    await fetch(URL_SERVICO, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        body: JSON.stringify({id: idOficial, ...dadosBase, ...dadosServico}) 
                    });

                    alert("BRCELL: OS #" + idOficial + " salva com sucesso!");
                    location.reload();
                }
            } catch (err) { 
                alert("Erro ao salvar. Verifique sua conexão."); 
            }
            loading.style.display = 'none';
        };

        function maskTel(v) { v.value = v.value.replace(/\D/g, "").replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2").substring(0, 15); }
        function maskMoney(v) { let val = v.value.replace(/\D/g, ""); val = (val / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); v.value = val; }
        
        async function buscarCEP(cep) {
            const clean = cep.replace(/\D/g, '');
            if (clean.length === 8) {
                const res = await fetch(`https://viacep.com.br/ws/${clean}/json/`);
                const d = await res.json();
                if (!d.erro) {
                    document.getElementById('endereco').value = d.logradouro;
                    document.getElementById('bairro').value = d.bairro;
                    document.getElementById('cidade_uf').value = `${d.localidade} - ${d.uf}`;
                }
            }
        }
        function resize() {
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            pad.clear();
        }
        window.onresize = resize; resize();
        lucide.createIcons();
    </script>
</body>
</html>
