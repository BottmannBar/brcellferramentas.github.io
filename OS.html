<script>
    const canvas = document.getElementById("signature-pad");
    const pad = new SignaturePad(canvas);
    const URL_API = "https://script.google.com/macros/s/AKfycbywltON6nzG12zwoHHEGvDUTM-_OLDYxVBINuxrcX3vUY0rBuw0Y-7WLK1EUZj-7js/exec";

    document.getElementById('data_entrada').valueAsDate = new Date();

    // Funções de máscara permanecem as mesmas...
    function maskTel(v) { v.value = v.value.replace(/\D/g, "").replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2").substring(0, 15); }
    function maskCPF(v) { v.value = v.value.replace(/\D/g, "").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2").substring(0, 14); }
    function maskCEP(v) { v.value = v.value.replace(/\D/g, "").replace(/^(\d{5})(\d)/, "$1-$2").substring(0, 9); }
    function maskMoney(v) {
        let val = v.value.replace(/\D/g, "");
        val = (val / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        v.value = val;
    }

    document.getElementById('formEntrada').onsubmit = async (e) => {
        e.preventDefault();
        
        if (pad.isEmpty()) {
            alert("Por favor, peça ao cliente para assinar.");
            return;
        }

        const btn = document.getElementById('btnEnviar');
        btn.innerText = "GERANDO COMPROVANTE...";
        btn.disabled = true;

        // 1. GERAR DADOS IMEDIATOS
        const agora = new Date();
        const protocolo = agora.getFullYear().toString() + (agora.getMonth() + 1).toString().padStart(2, '0') + agora.getDate().toString().padStart(2, '0') + agora.getHours().toString().padStart(2, '0') + agora.getMinutes().toString().padStart(2, '0');
        const dataOS = document.getElementById('data_entrada').value.split('-').reverse().join('/');
        const imgAssinatura = pad.toDataURL();

        // 2. PREENCHER O COMPROVANTE (FORÇA O HTML A RECEBER OS DADOS AGORA)
        document.getElementById('print_os').textContent = protocolo;
        document.getElementById('print_nome').textContent = document.getElementById('nome').value.toUpperCase();
        document.getElementById('print_tel').textContent = document.getElementById('telefone').value;
        document.getElementById('print_cpf').textContent = document.getElementById('cpf').value;
        document.getElementById('print_data').textContent = dataOS;
        document.getElementById('print_aparelho').textContent = document.getElementById('aparelho').value.toUpperCase();
        document.getElementById('print_problema').textContent = document.getElementById('problema').value;
        document.getElementById('print_valor').textContent = document.getElementById('valor_servico').value;
        document.getElementById('print_checklist').textContent = document.getElementById('desligado').checked ? "DESLIGADO TOTALMENTE" : [...document.querySelectorAll('input[name="checklist"]:checked')].map(s => s.value).join(", ");
        
        const imgPrint = document.getElementById('print_assinatura');
        imgPrint.src = imgAssinatura;

        // 3. TROCAR TELAS ANTES DE IMPRIMIR
        document.getElementById('formEntrada').style.display = 'none';
        document.getElementById('comprovante').style.display = 'block';

        // 4. DISPARAR IMPRESSÃO COM DELAY DE SEGURANÇA
        // Isso dá tempo para o navegador processar o texto e a imagem da assinatura
        imgPrint.onload = () => {
            setTimeout(() => {
                window.print();
                
                // 5. SÓ DEPOIS DE IMPRIMIR, ELE ENVIA PARA A PLANILHA (OPCIONAL)
                enviarParaPlanilha(protocolo, dataOS, imgAssinatura);
            }, 1000);
        };
    };

    async function enviarParaPlanilha(os, dataOS, assinaturaB64) {
        const toB64 = f => new Promise(res => {
            if(!f) res(""); const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f);
        });

        const payload = {
            os: os,
            data: dataOS,
            nome: document.getElementById('nome').value,
            telefone: document.getElementById('telefone').value,
            cpf: document.getElementById('cpf').value,
            cep: document.getElementById('cep').value,
            endereco: `${document.getElementById('rua').value}, ${document.getElementById('numero').value}`,
            bairro: document.getElementById('bairro').value,
            municipio: document.getElementById('municipio_uf').value,
            aparelho: document.getElementById('aparelho').value,
            senha: document.getElementById('senha').value,
            problema: document.getElementById('problema').value,
            valor: document.getElementById('valor_servico').value,
            checklist: document.getElementById('print_checklist').textContent,
            fotoFrente: await toB64(document.getElementById('fotoFrente').files[0]),
            fotoVerso: await toB64(document.getElementById('fotoVerso').files[0]),
            assinatura: assinaturaB64
        };

        fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    }
</script>
